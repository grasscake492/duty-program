<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台-图片社排班系统</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #ccc3e2 100%); color: #333; line-height: 1.6; padding: 20px; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 30px; padding: 25px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .description { color: #7f8c8d; font-size: 1.1em; }

        .card { background: white; border-radius: 12px; padding: 30px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); transition: transform 0.2s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08); }

        .tabs { display: flex; margin-bottom: 25px; background: rgba(255,255,255,0.5); padding: 5px; border-radius: 10px; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; border-radius: 8px; font-weight: 600; color: #555; transition: all 0.3s; margin: 0 5px; }
        .tab:hover { background: rgba(255,255,255,0.8); color: #3498db; }
        .tab.active { background: #3498db; color: white; box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3); }

        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input[type="text"], input[type="tel"], input[type="date"] { padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; transition: border-color 0.3s; outline: none; }
        input:focus { border-color: #3498db; }

        button { background: #3498db; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; transition: all 0.2s; }
        button:hover { background: #2980b9; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3); }

        .user-tag { display: inline-block; padding: 8px 16px; background: #f0f2f5; color: #2c3e50; border-radius: 20px; cursor: pointer; font-weight: 600; margin: 5px; transition: all 0.2s; border: 2px solid transparent; }
        .user-tag:hover { background: #e1e4e8; transform: scale(1.05); }
        .user-tag.active-tag { background: #3498db; color: white; border-color: #2980b9; box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3); }

        /* 预览表格样式 */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        th { background-color: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }

        .download-btn { display: inline-block; background: #2ecc71; color: white; padding: 12px 30px; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 15px; transition: all 0.2s; }
        .download-btn:hover { background: #27ae60; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3); transform: translateY(-2px); }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>图片社自动排班系统 · 管理后台</h1>
        <p id="week-display-title" class="description">正在加载系统配置...</p>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('user')">1. 代填排班</div>
        <div class="tab" onclick="switchTab('view')">2. 查看详情</div>
        <div class="tab" onclick="switchTab('admin')">3. 计划与生成</div>
    </div>

    <!-- TAB 1: 管理员替人填表 -->
    <div id="user" class="tab-content active">
        <div class="card">
            <h2 style="margin-bottom:20px; color:#2c3e50;">填写可用时间</h2>
            <div style="margin-bottom:25px; display:flex; gap:15px; flex-wrap:wrap;">
                <input type="text" id="name" placeholder="姓名" style="flex:1;">
                <input type="text" id="phone" placeholder="手机号" style="flex:1;">
                <div style="display:flex; align-items:center; gap:15px; background:#f9f9f9; padding:0 15px; border-radius:8px; border:2px solid #e0e0e0;">
                    <label style="cursor:pointer;"><input type="radio" name="role" value="intern"> 实习</label>
                    <label style="cursor:pointer;"><input type="radio" name="role" value="senior"> 高级</label>
                </div>
            </div>

            <!-- 动态生成的填表网格 -->
            <div id="admin-fill-grid"></div>

            <div style="margin-top:25px; text-align:right;">
                <button id="submit-btn">提交排班数据</button>
            </div>
        </div>
    </div>

    <!-- TAB 2: 查看数据 -->
    <div id="view" class="tab-content">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2>已提交名单</h2>
                <button onclick="loadSubmittedData()" style="background:#95a5a6;">↻ 刷新列表</button>
            </div>

            <div id="submitted-list-view" style="display:flex; flex-wrap:wrap;"></div>

            <!-- 详情区域 -->
            <div id="user-detail-view" style="display:none; margin-top:30px; border-top:2px dashed #eee; padding-top:20px; animation:fadeIn 0.3s;">
                <h3 style="margin-bottom:15px;">
                    <span id="detail-name" style="color:#e74c3c;"></span> 的时间详情：
                </h3>

                <!-- 动态生成的只读网格容器 -->
                <div id="readonly-view-grid"></div>
            </div>
        </div>
    </div>

    <!-- TAB 3: 创建计划 & 生成 -->
    <div id="admin" class="tab-content">
        <!-- 上半部分：创建计划 -->
        <div class="card" style="border-left: 5px solid #f39c12;">
            <h2 style="color:#e67e22; margin-bottom:15px;">创建新排班计划</h2>
            <p style="color:#7f8c8d; margin-bottom:20px;">设置本周需要排班的名称和具体日期范围。</p>

            <div style="display:flex; gap:15px; margin-bottom:15px; align-items:center;">
                <input type="text" id="week-name" placeholder="周次名 (如: 第5周)" style="width:200px;">
                <input type="date" id="start-date" onchange="previewDates()">
                <span style="font-weight:bold;">至</span>
                <input type="date" id="end-date" onchange="previewDates()">
            </div>

            <div id="date-selection-area" style="display:none; background:#fdfdfd; padding:20px; border-radius:8px; border:1px solid #eee; margin-bottom:20px;">
                <h4 style="margin-bottom:15px;">请勾选需要排班的日期：</h4>
                <div id="dates-checkboxes" style="display:flex; flex-wrap:wrap; gap:15px;"></div>
            </div>

            <button onclick="createSchedule()" style="background:#f39c12;">保存排班计划</button>
        </div>

        <!-- 下半部分：生成 Excel -->
        <div class="card">
            <h2 style="margin-bottom:15px;">生成排班表</h2>

            <button onclick="generateSchedule()">生成预览并导出</button>

            <div id="schedule-result" style="margin-top:20px;">
                <!-- 先显示表格，后显示下载按钮 -->
                <table id="schedule-table">
                    <thead><tr><th>暂无预览数据</th></tr></thead>
                    <tbody></tbody>
                </table>

                <div id="export-download-area" style="text-align:center; margin-top:20px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    function switchTab(id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelector(`.tab[onclick="switchTab('${id}')"]`).classList.add('active');
        document.getElementById(id).classList.add('active');
    }
</script>
<script src="/js/main.js"></script>
</body>
</html>
