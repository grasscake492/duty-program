<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游客-课表上传</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #ccc3e2 100%); color: #333; line-height: 1.6; padding: 20px; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; } /* 游客页窄一点更好看 */
        header { text-align: center; margin-bottom: 30px; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        .description { color: #7f8c8d; max-width: 800px; margin: 0 auto; }
        .card { background: white; border-radius: 10px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #2c3e50; }
        input[type="text"], input[type="tel"] { width: 100%; padding: 12px 15px; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; transition: border-color 0.3s; }
        input[type="text"]:focus, input[type="tel"]:focus { border-color: #3498db; outline: none; }
        button { background: #3498db; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; transition: background 0.3s, transform 0.2s; width: 100%; }
        button:hover { background: #2980b9; transform: translateY(-2px); }
        button:disabled { background: #bdc3c7; cursor: not-allowed; transform: none; }

        .schedule-grid { display: grid; grid-template-columns: 80px repeat(5, 1fr); gap: 8px; margin-top: 20px; }
        .time-slot { background: #34495e; color: white; padding: 10px 5px; text-align: center; border-radius: 4px; font-weight: 600; font-size: 14px; display: flex; align-items: center; justify-content: center; }
        .day-header { background: #2c3e50; color: white; padding: 10px 5px; text-align: center; border-radius: 4px; font-weight: 600; font-size: 14px; }

        .schedule-cell { background: #ecf0f1; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 4px; cursor: pointer; transition: all 0.2s ease; font-weight: 500; user-select: none; font-size: 13px; color: #7f8c8d; }
        .schedule-cell:hover { background: #dfe6e9; }
        .schedule-cell.selected { background: #2ecc71; color: white; font-weight: bold; box-shadow: 0 2px 8px rgba(46, 204, 113, 0.4); transform: scale(1.05); }

        .role-options { display: flex; gap: 20px; margin-top: 10px; }
        .role-option { display: flex; align-items: center; gap: 6px; padding: 10px 15px; border: 2px solid #ddd; border-radius: 6px; cursor: pointer; font-weight: 600; background: #f8f9fa; flex: 1; justify-content: center; }
        .role-option:hover { border-color: #3498db; }
        .role-option input[type="radio"] { transform: scale(1.2); }

        .status-message { margin-top: 15px; padding: 10px; border-radius: 5px; background: #f8f9fa; border-left: 4px solid #bdc3c7; display: none; }
        .status-message.error { border-left-color: #e74c3c; background: #fadbd8; display: block; color: #c0392b; }
        .status-message.success { border-left-color: #2ecc71; background: #d5f5e3; display: block; color: #27ae60; }
        .status-message.loading { border-left-color: #3498db; background: #d6eaf8; display: block; color: #2980b9; }

        @media (max-width: 768px) {
            .schedule-grid { grid-template-columns: 60px repeat(5, 1fr); gap: 4px; }
            .time-slot, .day-header, .schedule-cell { font-size: 12px; height: 50px; padding: 2px; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>图片社自助排班系统</h1>
        <!-- 这里会动态显示后端计算的教学周 -->
        <p class="description" id="week-info">正在连接服务器获取教学周信息...</p>
    </header>

    <div class="card">
        <h2>个人信息</h2>
        <div class="form-group">
            <label for="name">姓名</label>
            <input type="text" id="name" placeholder="请输入您的姓名" required>
        </div>
        <div class="form-group">
            <label for="phone">手机号码</label>
            <input type="tel" id="phone" placeholder="请输入手机号码" required>
        </div>
        <div class="form-group">
            <label>身份选择</label>
            <div class="role-options">
                <label class="role-option">
                    <input type="radio" name="role" value="intern"> 实习
                </label>
                <label class="role-option">
                    <input type="radio" name="role" value="senior"> 中高级
                </label>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>选择有空的时间</h2>
        <p style="color: #7f8c8d; font-size: 0.9em;">点击格子切换选中状态（绿色为选中）</p>

        <!-- 动态生成的表格容器 -->
        <!-- 关键：ID必须为 guest-schedule-container，以便 main.js 识别并填充 -->
        <div id="guest-schedule-container">
            <p style="text-align:center; padding:20px; color:#999;">正在加载排班计划...</p>
        </div>

        <div style="margin-top: 25px;">
            <button id="submit-btn" disabled>正在初始化...</button>
            <div id="status-msg" class="status-message"></div>
        </div>
    </div>
</div>

<!-- 关键：直接引入 main.js，复用其中的 renderGrid 和 bindSubmitEvent 逻辑 -->
<!-- 这样既解决了 undefined 问题，也解决了表格不显示的问题 -->
<script src="/js/main.js"></script>

</body>
</html>
